name: Helix token unlocks (ingest + short signals)

# Pulls upcoming token-unlock schedules from DefiLlama (keyless), upserts the
# /unlocks calendar, then generates SHORT signals for near-term, perp-tradable
# unlocks. DefiLlama refreshes its emission adapters ~once/day, so a single
# daily fire is the right cadence. Runs at 09:00 UTC — before the 11:00 data
# refresh and 13:20 briefing — so the day's unlock shorts are on the board.
#
# Uses the existing CRON_SECRET repo secret (same as tick + briefing).

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  unlocks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Ingest token unlocks + generate short signals
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: https://helix-alpha-kappa.vercel.app
        run: |
          echo "--- ingest-unlocks ---"
          code=$(curl -sS -o /tmp/out.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Accept: application/json" \
            --max-time 120 \
            "$BASE_URL/api/cron/ingest-unlocks") || true
          echo "  HTTP $code"
          cat /tmp/out.json 2>/dev/null | head -c 600; echo
          [ "$code" = "200" ] || exit 1
