name: Helix tick (15-min pipeline)

# Pokes the production /api/cron/tick endpoint every 15 minutes so the
# live deploy stays fresh during the judging window.
#
# Vercel Hobby tier only allows daily crons, so this workflow is the
# external scheduler that keeps news ingestion + signal generation
# running on a real cadence.
#
# Requires the repo secret CRON_SECRET (set under Settings → Secrets and
# variables → Actions). The same value must be configured as CRON_SECRET
# in Vercel's environment variables.

on:
  schedule:
    # GitHub Actions cron is throttled hard under load — a single
    # "*/15 * * * *" schedule averages ~96 min between fires (6× the
    # nominal cadence). We mitigate by stacking THREE schedules with
    # coprime intervals; GHA treats each as an independent line and
    # the union has a much higher chance that at least one fires near
    # any given target time. The tick itself is idempotent (recordRun
    # short-circuits if a prior run is still in flight), so duplicate
    # fires are harmless.
    - cron: "*/15 * * * *"   # :00 :15 :30 :45
    - cron: "7-59/12 * * * *" # :07 :19 :31 :43 :55  — offset, 12-min cycle
    - cron: "3-59/7 * * * *"  # :03 :10 :17 :24 :31 :38 :45 :52 :59 — prime
  # Allow manual triggering from the Actions tab for ad-hoc refreshes.
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/cron/tick
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: https://helix-alpha-kappa.vercel.app
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Accept: application/json" \
            --max-time 90 \
            "$BASE_URL/api/cron/tick" \
            | tee response.json
          echo
          echo "tick complete"
